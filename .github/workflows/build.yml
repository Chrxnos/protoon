name: Build Protoon

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-app:
    name: Build User Application
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Build Application
      shell: cmd
      run: |
        cd backend\protoon_kernel
        mkdir build
        cl /EHsc /std:c++17 /O2 /W4 /D "UNICODE" /D "_UNICODE" /Fe"build\Protoon.exe" main.cpp /link /SUBSYSTEM:CONSOLE winhttp.lib shell32.lib
    
    - name: Upload App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: protoon-app
        path: backend/protoon_kernel/build/Protoon.exe

  package-release:
    name: Package Release
    needs: [build-app]
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download App
      uses: actions/download-artifact@v4
      with:
        name: protoon-app
        path: release/
    
    - name: Copy Source Files
      shell: cmd
      run: |
        copy "backend\protoon_kernel\driver.c" "release\driver.c"
        copy "backend\protoon_kernel\memory_reader.hpp" "release\memory_reader.hpp"
        copy "backend\protoon_kernel\FULL_GUIDE.md" "release\README.md"
        copy "backend\protoon_kernel\BUILD.md" "release\BUILD_DRIVER.md"
    
    - name: Create Install Script
      shell: cmd
      run: |
        echo @echo off > release\install.bat
        echo echo ======================================== >> release\install.bat
        echo echo    Protoon v1.4.2 Installer >> release\install.bat
        echo echo ======================================== >> release\install.bat
        echo net session ^>nul 2^>^&1 >> release\install.bat
        echo if %%errorLevel%% neq 0 ( >> release\install.bat
        echo     echo ERROR: Run as Administrator! >> release\install.bat
        echo     pause >> release\install.bat
        echo     exit /b 1 >> release\install.bat
        echo ) >> release\install.bat
        echo mkdir "C:\Protoon" 2^>nul >> release\install.bat
        echo copy /Y "%%~dp0Protoon.exe" "C:\Protoon\" >> release\install.bat
        echo copy /Y "%%~dp0README.md" "C:\Protoon\" >> release\install.bat
        echo echo. >> release\install.bat
        echo echo Installed to C:\Protoon\ >> release\install.bat
        echo echo. >> release\install.bat
        echo echo Run: C:\Protoon\Protoon.exe >> release\install.bat
        echo echo Debug: C:\Protoon\Protoon.exe --debug >> release\install.bat
        echo pause >> release\install.bat
    
    - name: Create Uninstall Script  
      shell: cmd
      run: |
        echo @echo off > release\uninstall.bat
        echo net session ^>nul 2^>^&1 >> release\uninstall.bat
        echo if %%errorLevel%% neq 0 ( >> release\uninstall.bat
        echo     echo ERROR: Run as Administrator! >> release\uninstall.bat
        echo     pause >> release\uninstall.bat
        echo     exit /b 1 >> release\uninstall.bat
        echo ) >> release\uninstall.bat
        echo sc stop ProtoonDrv 2^>nul >> release\uninstall.bat
        echo sc delete ProtoonDrv 2^>nul >> release\uninstall.bat
        echo rmdir /s /q "C:\Protoon" 2^>nul >> release\uninstall.bat
        echo echo Uninstalled. >> release\uninstall.bat
        echo pause >> release\uninstall.bat
    
    - name: Create ZIP Package
      shell: powershell
      run: |
        Compress-Archive -Path "release\*" -DestinationPath "Protoon-v1.4.2-win64.zip"
    
    - name: Upload Release Package
      uses: actions/upload-artifact@v4
      with:
        name: protoon-release
        path: Protoon-v1.4.2-win64.zip

  create-release:
    name: Create GitHub Release
    needs: package-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - name: Download Release Package
      uses: actions/download-artifact@v4
      with:
        name: protoon-release
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: Protoon-v1.4.2-win64.zip
        body: |
          ## Protoon v1.4.2 - CFrame Fix (Parts Now Visible!)
          
          **Critical fix**: Parts were invisible in Roblox Studio because CFrame position was read from wrong memory indices. Fixed the row-major CFrame layout.
          
          ### Bug Fix
          - **CFrame reading was wrong** — Roblox stores CFrame as ROW-MAJOR `[R00,R01,R02, R10,R11,R12, R20,R21,R22, X,Y,Z]`. We were reading position from indices [3,7,11] (column-major assumption) instead of [9,10,11]. This placed all parts at rotation-matrix values (-1 to 1) instead of their real world coordinates.
          - **Rotation matrix was transposed** — Column-to-row conversion was applied but data was already row-major. Removed the transpose.
          - **Added CFrame validation** — Degenerate rotation matrices (all zeros) fall back to identity. NaN values are detected and replaced.
          - **Added `--debug` part diagnostic** — Running with `--debug` now shows the first 5 parts' CFrame/Size/Transparency data for verification.
          
          ### Previous Fixes (v1.4.0-v1.4.1)
          - Path duplication fix
          - Terrain class skipped in RBXLX
          - Map-only mode no longer shows assets
          - Authenticated CDN downloads via cookie.txt
          - Retry logic for downloads
          
          ### Extraction Options
          1. Map only (.rbxlx)
          2. Decals / Images
          3. Audio / Sounds
          4. Animations
          5. Meshes (MeshPart textures)
          6. Sky Textures
          7. All Assets (no map)
          8. Everything (map + all assets)
          
          ### Quick Start
          1. Download and extract the ZIP
          2. Run `install.bat` as Administrator  
          3. (Optional) Create `cookie.txt` with your `.ROBLOSECURITY` cookie
          4. Join a Roblox game and wait for it to load
          5. Run `C:\Protoon\Protoon.exe`
          6. Choose extraction options
          7. Check the `Downloads/` folder for output
          
          ### Troubleshooting
          - Run with `--debug` flag for verbose output
          - Make sure you're **inside a game** (not the menu/lobby)
          - Wait for the game to **fully load** before running
          - Run as **Administrator**
          - For download failures: add `cookie.txt` with your Roblox session cookie
          
          ### For Kernel Driver (Undetected Mode)
          Build `driver.c` with Visual Studio + WDK - see BUILD_DRIVER.md
        draft: false
        prerelease: false
