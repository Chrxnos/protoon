name: Build Protoon

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-app:
    name: Build User Application
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Build Application
      shell: cmd
      run: |
        cd backend\protoon_kernel
        mkdir build
        cl /EHsc /std:c++17 /O2 /W4 /D "UNICODE" /D "_UNICODE" /Fe"build\Protoon.exe" main.cpp /link /SUBSYSTEM:CONSOLE
    
    - name: Upload App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: protoon-app
        path: backend/protoon_kernel/build/Protoon.exe

  package-release:
    name: Package Release
    needs: [build-app]
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download App
      uses: actions/download-artifact@v4
      with:
        name: protoon-app
        path: release/
    
    - name: Copy Source Files
      shell: powershell
      run: |
        # Copy driver source (user will build manually or we provide pre-built)
        Copy-Item "backend/protoon_kernel/driver.c" "release/driver.c"
        Copy-Item "backend/protoon_kernel/memory_reader.hpp" "release/memory_reader.hpp"
        Copy-Item "backend/protoon_kernel/FULL_GUIDE.md" "release/README.md"
        Copy-Item "backend/protoon_kernel/BUILD.md" "release/BUILD_DRIVER.md"
        
        # Create install script
        @"
@echo off
echo ========================================
echo    Protoon Installer
echo    Kernel-Level Roblox Map Extractor
echo ========================================
echo.

:: Check for admin
net session >nul 2>&1
if %errorLevel% neq 0 (
    echo ERROR: Please run as Administrator!
    echo Right-click this file and select "Run as administrator"
    pause
    exit /b 1
)

echo [1/4] Checking test signing mode...
for /f "tokens=*" %%a in ('bcdedit /enum ^| findstr /i "testsigning"') do set TESTSIGN=%%a
echo %TESTSIGN% | findstr /i "Yes" >nul
if %errorLevel% neq 0 (
    echo Test signing is NOT enabled.
    echo.
    set /p ENABLE="Enable test signing now? (Y/N): "
    if /i "!ENABLE!"=="Y" (
        bcdedit /set testsigning on
        echo.
        echo Test signing enabled. Please REBOOT and run this installer again.
        pause
        exit /b 0
    ) else (
        echo Cannot continue without test signing.
        pause
        exit /b 1
    )
)
echo Test signing is enabled. Good!

echo.
echo [2/4] Creating installation directory...
mkdir "C:\Protoon" 2>nul
copy /Y "Protoon.exe" "C:\Protoon\"
copy /Y "README.md" "C:\Protoon\"

if exist "ProtoonDriver.sys" (
    copy /Y "ProtoonDriver.sys" "C:\Protoon\"
    
    echo.
    echo [3/4] Installing kernel driver...
    sc stop ProtoonDrv >nul 2>&1
    sc delete ProtoonDrv >nul 2>&1
    sc create ProtoonDrv type= kernel binpath= "C:\Protoon\ProtoonDriver.sys"
    if %errorLevel% neq 0 (
        echo WARNING: Failed to create driver service
        echo You may need to build the driver manually - see BUILD_DRIVER.md
    ) else (
        echo.
        echo [4/4] Starting driver...
        sc start ProtoonDrv
        if %errorLevel% neq 0 (
            echo WARNING: Failed to start driver
            echo Try rebooting and running installer again
        )
    )
) else (
    echo.
    echo NOTE: Driver not included in this release.
    echo The application will work in user-mode (may be detected by Hyperion).
    echo To build the kernel driver, see BUILD_DRIVER.md
)

echo.
echo ========================================
echo    Installation Complete!
echo ========================================
echo.
echo Protoon installed to: C:\Protoon\
echo.
echo To extract a map:
echo   1. Join a Roblox game
echo   2. Open Command Prompt as Admin
echo   3. Run: C:\Protoon\Protoon.exe
echo   4. Open the .rbxlx file in Roblox Studio
echo.
pause
"@ | Out-File -FilePath "release/install.bat" -Encoding ASCII
        
        # Create uninstall script
        @"
@echo off
echo Uninstalling Protoon...

net session >nul 2>&1
if %errorLevel% neq 0 (
    echo ERROR: Please run as Administrator!
    pause
    exit /b 1
)

sc stop ProtoonDrv 2>nul
sc delete ProtoonDrv 2>nul
rmdir /s /q "C:\Protoon" 2>nul

echo.
echo Protoon uninstalled.
echo.
echo To disable test signing mode:
echo   bcdedit /set testsigning off
echo   (then reboot)
echo.
pause
"@ | Out-File -FilePath "release/uninstall.bat" -Encoding ASCII
    
    - name: Create ZIP Package
      shell: powershell
      run: |
        Compress-Archive -Path "release\*" -DestinationPath "Protoon-v1.0.0-win64.zip"
    
    - name: Upload Release Package
      uses: actions/upload-artifact@v4
      with:
        name: protoon-release
        path: Protoon-v1.0.0-win64.zip

  create-release:
    name: Create GitHub Release
    needs: package-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - name: Download Release Package
      uses: actions/download-artifact@v4
      with:
        name: protoon-release
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: Protoon-v1.0.0-win64.zip
        body: |
          ## Protoon v1.0.0
          
          Kernel-level Roblox map extractor that operates beneath Hyperion anti-cheat.
          
          ### What's Included
          - `Protoon.exe` - Map extractor application
          - `driver.c` - Kernel driver source (build with WDK)
          - `memory_reader.hpp` - Memory offsets library
          - `install.bat` / `uninstall.bat` - Installer scripts
          - Documentation
          
          ### Quick Start
          1. Download `Protoon-v1.0.0-win64.zip`
          2. Extract to any folder
          3. Right-click `install.bat` → Run as Administrator
          4. Join a Roblox game
          5. Run `C:\Protoon\Protoon.exe` (as Admin)
          6. Open the `.rbxlx` in Roblox Studio
          
          ### Building the Kernel Driver
          For undetected operation, build `driver.c` with Visual Studio + WDK.
          See `BUILD_DRIVER.md` for instructions.
          
          ### Requirements
          - Windows 10/11 x64
          - Administrator privileges
          - Test signing mode (for kernel driver)
        draft: false
        prerelease: false
