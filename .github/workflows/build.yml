name: Build Protoon

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-app:
    name: Build User Application
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Build Application
      shell: cmd
      run: |
        cd backend\protoon_kernel
        mkdir build
        cl /EHsc /std:c++17 /O2 /W4 /D "UNICODE" /D "_UNICODE" /Fe"build\Protoon.exe" main.cpp /link /SUBSYSTEM:CONSOLE winhttp.lib shell32.lib
    
    - name: Upload App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: protoon-app
        path: backend/protoon_kernel/build/Protoon.exe

  package-release:
    name: Package Release
    needs: [build-app]
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download App
      uses: actions/download-artifact@v4
      with:
        name: protoon-app
        path: release/
    
    - name: Copy Source Files
      shell: cmd
      run: |
        copy "backend\protoon_kernel\driver.c" "release\driver.c"
        copy "backend\protoon_kernel\memory_reader.hpp" "release\memory_reader.hpp"
        copy "backend\protoon_kernel\FULL_GUIDE.md" "release\README.md"
        copy "backend\protoon_kernel\BUILD.md" "release\BUILD_DRIVER.md"
    
    - name: Create Install Script
      shell: cmd
      run: |
        echo @echo off > release\install.bat
        echo echo ======================================== >> release\install.bat
        echo echo    Protoon v1.5.1 Installer >> release\install.bat
        echo echo ======================================== >> release\install.bat
        echo net session ^>nul 2^>^&1 >> release\install.bat
        echo if %%errorLevel%% neq 0 ( >> release\install.bat
        echo     echo ERROR: Run as Administrator! >> release\install.bat
        echo     pause >> release\install.bat
        echo     exit /b 1 >> release\install.bat
        echo ) >> release\install.bat
        echo mkdir "C:\Protoon" 2^>nul >> release\install.bat
        echo copy /Y "%%~dp0Protoon.exe" "C:\Protoon\" >> release\install.bat
        echo copy /Y "%%~dp0README.md" "C:\Protoon\" >> release\install.bat
        echo echo. >> release\install.bat
        echo echo Installed to C:\Protoon\ >> release\install.bat
        echo echo. >> release\install.bat
        echo echo Run: C:\Protoon\Protoon.exe >> release\install.bat
        echo echo Debug: C:\Protoon\Protoon.exe --debug >> release\install.bat
        echo pause >> release\install.bat
    
    - name: Create Uninstall Script  
      shell: cmd
      run: |
        echo @echo off > release\uninstall.bat
        echo net session ^>nul 2^>^&1 >> release\uninstall.bat
        echo if %%errorLevel%% neq 0 ( >> release\uninstall.bat
        echo     echo ERROR: Run as Administrator! >> release\uninstall.bat
        echo     pause >> release\uninstall.bat
        echo     exit /b 1 >> release\uninstall.bat
        echo ) >> release\uninstall.bat
        echo sc stop ProtoonDrv 2^>nul >> release\uninstall.bat
        echo sc delete ProtoonDrv 2^>nul >> release\uninstall.bat
        echo rmdir /s /q "C:\Protoon" 2^>nul >> release\uninstall.bat
        echo echo Uninstalled. >> release\uninstall.bat
        echo pause >> release\uninstall.bat
    
    - name: Create ZIP Package
      shell: powershell
      run: |
        Compress-Archive -Path "release\*" -DestinationPath "Protoon-v1.5.1-win64.zip"
    
    - name: Upload Release Package
      uses: actions/upload-artifact@v4
      with:
        name: protoon-release
        path: Protoon-v1.5.1-win64.zip

  create-release:
    name: Create GitHub Release
    needs: package-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - name: Download Release Package
      uses: actions/download-artifact@v4
      with:
        name: protoon-release
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: Protoon-v1.5.1-win64.zip
        body: |
          ## Protoon v1.5.1 - RBXLX Serialization Fix
          
          **Critical fix**: Completely rewrote the `.rbxlx` XML serialization to match Roblox Studio's expected format. Maps should now load correctly with visible parts.
          
          ### Bug Fixes
          - **Material tokens fixed** — Material property now writes correct integer enum values (e.g., `256` for Plastic) instead of string names that Roblox couldn't parse
          - **Color3uint8 format** — Part colors now use the packed `Color3uint8` format (`0xFFRRGGBB`) matching how Roblox Studio saves files
          - **Locale-independent floats** — All float values now always use '.' as decimal separator, fixing invisible parts on non-English Windows systems
          - **Force-anchored parts** — All extracted parts are set to Anchored=true to prevent them from falling on load
          - **Clean XML header** — Removed unnecessary XML attributes and `<External>` tags that could cause parse issues
          - **Visual elements preserved** — Decal, Texture, SpecialMesh, Attachment, lights, and particle effects are no longer skipped
          
          ### What Changed (Technical)
          - `<token name="Material">Plastic</token>` → `<token name="Material">256</token>` (integer enum value)
          - `<Color3 name="Color"><R>0.63</R>...</Color3>` → `<Color3uint8 name="Color3uint8">4288714675</Color3uint8>` (packed uint32)
          - `<roblox xmlns:xmime=... version="4">` → `<roblox version="4">` (minimal header)
          - All float values are now locale-safe (no commas as decimal separators)
          
          ### Debug Mode
          Run with `--debug` to see:
          - First 5 parts' CFrame, Size, Color, MeshId, TextureID values
          - Auto-detected offset addresses for MeshId and PartSize
          
          Use: `Protoon.exe --debug` from Command Prompt as Administrator
          
          ### Quick Start
          1. Download and extract the ZIP
          2. Run `install.bat` as Administrator  
          3. (Optional) Create `cookie.txt` with your `.ROBLOSECURITY` cookie
          4. Join a Roblox game and wait for it to load
          5. Run `C:\Protoon\Protoon.exe`
          6. Choose extraction options
          7. Check the `Downloads/` folder for output
          
          ### Troubleshooting
          - Run with `--debug` flag for verbose output
          - Make sure you're **inside a game** (not the menu/lobby)
          - Wait for the game to **fully load** before running
          - Run as **Administrator**
          - If parts still invisible: share the --debug output so we can check CFrame/Size values
        draft: false
        prerelease: false
